<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resources — MEND</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
<nav class="navbar" id="navbar"></nav>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main-content">

    <div class="page-header">
      <div class="page-title">Resource Library</div>
      <div class="page-sub">Psychoeducational articles and guides curated for African youth</div>
    </div>

    <!-- Search -->
    <div style="position:relative;max-width:480px;margin-bottom:28px">
      <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px">🔍</span>
      <input id="search-box" class="form-input" placeholder="Search articles…" style="padding-left:44px" oninput="filterResources()" />
    </div>

    <!-- Category Filters -->
    <div class="tabs mb-24" id="cat-filters">
      <button class="tab-btn active" onclick="filterCat('', this)">All</button>
      <button class="tab-btn" onclick="filterCat('Mental Health', this)">🧠 Mental Health</button>
      <button class="tab-btn" onclick="filterCat('Self-Expression', this)">💬 Self-Expression</button>
      <button class="tab-btn" onclick="filterCat('African Perspectives', this)">🌍 African Perspectives</button>
      <button class="tab-btn" onclick="filterCat('Career', this)">🚀 Career</button>
      <button class="tab-btn" onclick="filterCat('Wellness', this)">😴 Wellness</button>
    </div>

    <!-- Resources Grid -->
    <div class="grid-auto" id="resources-grid">
      <div style="color:var(--muted)">Loading resources…</div>
    </div>

    <!-- Article Reader Modal -->
    <div id="article-modal" class="modal-overlay hidden">
      <div class="modal-box" style="max-width:640px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
          <span class="badge badge-orange" id="article-cat"></span>
          <button class="btn-ghost" onclick="closeArticle()">✕ Close</button>
        </div>
        <h3 id="article-title" style="margin-bottom:16px;line-height:1.4"></h3>
        <div id="article-body" style="font-size:15px;line-height:1.8;color:var(--dark)"></div>
        <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--cream);display:flex;gap:12px">
          <button class="btn btn-primary btn-sm" onclick="toast('Saved to your library!')">📌 Save Article</button>
          <button class="btn btn-ghost btn-sm" onclick="closeArticle()">Close</button>
        </div>
      </div>
    </div>

  </main>
</div>

<div id="toast"></div>
<script src="/main.js"></script>
<script>
if (!requireAuth()) throw 0;
buildNav("resources");
buildSidebar("resources");

let allResources = [];
let activeCat = "";

async function loadResources() {
  try {
    allResources = await GET("/resources");
    renderResources(allResources);
  } catch (e) { toast(e.message, "error"); }
}

function renderResources(list) {
  if (!list.length) {
    document.getElementById("resources-grid").innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--muted)">No articles found.</div>`;
    return;
  }
  document.getElementById("resources-grid").innerHTML = list.map(r => `
    <div class="resource-card" onclick="openArticle(${r.id})">
      <div style="font-size:36px;margin-bottom:14px">${r.icon}</div>
      <div class="badge badge-orange" style="margin-bottom:12px">${r.category}</div>
      <h3 style="font-size:16px;margin-bottom:10px;line-height:1.4">${escHtml(r.title)}</h3>
      <div style="font-size:13px;color:var(--muted)">📖 ${r.readTime} read</div>
    </div>
  `).join("");
}

function filterCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll("#cat-filters .tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  applyFilters();
}

function filterResources() { applyFilters(); }

function applyFilters() {
  const q = (document.getElementById("search-box").value || "").toLowerCase();
  let filtered = allResources;
  if (activeCat) filtered = filtered.filter(r => r.category === activeCat);
  if (q) filtered = filtered.filter(r => r.title.toLowerCase().includes(q) || r.category.toLowerCase().includes(q));
  renderResources(filtered);
}

function openArticle(id) {
  const r = allResources.find(r => r.id === id);
  if (!r) return;
  document.getElementById("article-cat").textContent   = r.category;
  document.getElementById("article-title").textContent = r.title;
  document.getElementById("article-body").innerHTML = `
    <p style="margin-bottom:16px">${r.content}</p>
    <p>Mental health is a journey, not a destination. The fact that you're here, reading this article, is already a step in the right direction. Remember to be patient with yourself.</p>
    <p style="margin-top:16px">If you're struggling, please don't hesitate to <a href="/therapy.html" style="color:var(--terracotta);font-weight:600">book a therapy session</a> or reach out to our crisis support line.</p>
    <div style="margin-top:24px;padding:16px;background:var(--cream);border-radius:12px;font-size:14px">
      💡 <strong>Try this today:</strong> Take 5 minutes to write in a journal about how you're feeling right now. No judgement, just flow.
    </div>
  `;
  document.getElementById("article-modal").classList.remove("hidden");
}

function closeArticle() {
  document.getElementById("article-modal").classList.add("hidden");
}

document.getElementById("article-modal").addEventListener("click", function(e) {
  if (e.target === this) closeArticle();
});

loadResources();
</script>
</body>
</html>
