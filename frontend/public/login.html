<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — MEND</title>
  <link rel="stylesheet" href="/mend.css" >
</head>
<body>
<div class="auth-wrap"> 
  <div class="auth-box">
    <a href="/" class="auth-logo">M<span>END</span> 🌱</a>
    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Sign in to continue your journey</p>

    <div id="error-msg" class="alert alert-error hidden"></div>

    <!-- Demo credentials hint -->
    <div class="alert alert-info mb-20">
      💡 <strong>Demo:</strong> admin@mend.com / admin123
    </div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input id="email" class="form-input" type="email" placeholder="you@example.com" value="admin@mend.com" />
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input id="password" class="form-input" type="password" placeholder="••••••••" value="admin123" />
    </div>

    <div class="flex justify-between items-center mb-24">
      <label class="flex items-center gap-8 text-sm cursor-pointer">
        <input type="checkbox" checked /> Remember me
      </label>
      <a class="text-sm color-terra cursor-pointer">Forgot password?</a>
    </div>

    <button class="btn btn-primary btn-full" id="submit-btn" onclick="doLogin()">
      Sign In →
    </button>

    <div class="auth-divider mt-20"><span>or</span></div>
    <div class="auth-switch">
      Don't have an account? <a href="/register.html">Sign up free</a>
    </div>

    <div class="auth-privacy">
      🔒 <strong>Your privacy matters.</strong> MEND uses industry-standard encryption to protect your mental health data. We never share your information without your consent.
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="/mend.js"></script>
<script>
  redirectIfLoggedIn();

  async function doLogin() {
    const email    = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errEl    = document.getElementById("error-msg");
    const btn      = document.getElementById("submit-btn");

    errEl.classList.add("hidden");
    if (!email || !password) {
      errEl.textContent = "⚠ Please enter your email and password.";
      errEl.classList.remove("hidden"); return;
    }

    btn.textContent = "Signing in…";
    btn.disabled = true;

    try {
      const data = await POST("/auth/login", { email, password });
      setAuth(data.token, data.user);
      toast("Welcome back, " + data.user.name + "! 🌱");
      setTimeout(() => window.location.href = "/dashboard.html", 700);
    } catch (err) {
      errEl.textContent = "⚠ " + err.message;
      errEl.classList.remove("hidden");
      btn.textContent = "Sign In →";
      btn.disabled = false;
    }
  }

</script>
</body>
</html>
