<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resources — MEND</title>
  <link rel="stylesheet" href="../css/mend.css" />
</head>
<body>
<div id="main-navbar"></div>
<div class="app-layout">
  <aside class="mend-sidebar" id="main-sidebar"></aside>
  <main class="main-content">

    <div class="page-header">
      <div class="page-title">Resource Library 📚</div>
      <div class="page-sub">Psychoeducational articles and guides curated for African youth</div>
    </div>

    <!-- Search -->
    <div class="position-relative mb-4">
      <span>🔍</span>
      <input id="search-box" class="form-control ps-5" placeholder="Search articles, topics…" oninput="filterResources()" />
    </div>

    <!-- Category Filters -->
    <div class="d-flex gap-2 flex-wrap mb-4" id="cat-filters">
      <button class="btn btn-sm btn-terra" onclick="filterCat('',this)">All</button>
      <button class="btn btn-sm btn-outline-terra" onclick="filterCat('Mental Health',this)">🧠 Mental Health</button>
      <button class="btn btn-sm btn-outline-terra" onclick="filterCat('Self-Expression',this)">💬 Self-Expression</button>
      <button class="btn btn-sm btn-outline-terra" onclick="filterCat('African Perspectives',this)">🌍 African Perspectives</button>
      <button class="btn btn-sm btn-outline-terra" onclick="filterCat('Career',this)">🚀 Career</button>
      <button class="btn btn-sm btn-outline-terra" onclick="filterCat('Wellness',this)">😴 Wellness</button>
    </div>

    <div class="row g-4" id="resources-grid">
      <div class="col-12 color-muted">Loading resources…</div>
    </div>

  </main>
</div>

<!-- Article Modal -->
<div id="article-modal" class="mend-modal-overlay d-none">
  <div class="mend-modal-box">
    <div class="d-flex justify-content-between align-items-start mb-3">
      <span class="mend-badge badge-terra" id="article-cat"></span>
      <button onclick="closeArticle()">✕</button>
    </div>
    <div id="article-icon"></div>
    <h3 id="article-title"></h3>
    <div id="article-meta" class="font-13 color-muted mb-4"></div>
    <div id="article-body" class="font-14 line-height-17 color-muted"></div>
    <div class="mt-4 pt-4">
      <button class="btn btn-terra" onclick="closeArticle()">Done ✓</button>
    </div>
  </div>
</div>

<script src="/js/mend.js"></script>
<script>
  if (!Auth.requireAuth()) throw new Error();
  renderNavbar('resources'); renderSidebar('resources');
  let allResources = [], activeCategory = '';

  async function loadResources() { allResources = await api.get('/resources'); renderResources(); }

  function filterCat(cat, btn) {
    activeCategory = cat;
    document.querySelectorAll('#cat-filters button').forEach(b => b.className='btn btn-sm btn-outline-terra');
    btn.className = 'btn btn-sm btn-terra';
    renderResources();
  }

  function filterResources() { renderResources(); }

  function renderResources() {
    const q = document.getElementById('search-box').value.toLowerCase();
    let filtered = allResources;
    if (activeCategory) filtered = filtered.filter(r => r.category === activeCategory);
    if (q) filtered = filtered.filter(r => r.title.toLowerCase().includes(q) || (r.content||'').toLowerCase().includes(q));
    const el = document.getElementById('resources-grid');
    if (!filtered.length) {
      el.innerHTML = '<div class="col-12"><div class="mend-card-flat text-center py-5"><div style="font-size:2.5rem">📚</div><h4 style="font-family:var(--serif);margin-top:12px">No resources found</h4><p class="color-muted">Try adjusting your search or filters.</p></div></div>';
      return;
    }
    el.innerHTML = filtered.map(r => `
      <div class="col-md-6 col-lg-4">
        <div class="resource-card" onclick='openArticle(${JSON.stringify(r)})'>
          <div class="resource-icon">${r.icon}</div>
          <div class="resource-cat">${r.category}</div>
          <div class="resource-title">${r.title}</div>
          <div class="resource-body">${r.content}</div>
          <div class="d-flex align-items-center justify-content-between mt-3">
            <span class="mend-badge badge-terra">⏱ ${r.readTime} read</span>
            <span class="color-terra font-13" style="font-weight:600">Read →</span>
          </div>
        </div>
      </div>`).join('');
  }

  function openArticle(r) {
    document.getElementById('article-cat').textContent = r.category;
    document.getElementById('article-icon').textContent = r.icon;
    document.getElementById('article-title').textContent = r.title;
    document.getElementById('article-meta').textContent = '⏱ ' + r.readTime + ' read';
    document.getElementById('article-body').innerHTML = r.content.split('\n').map(p=>p?`<p style="margin-bottom:12px">${p}</p>`:'').join('');
    document.getElementById('article-modal').classList.remove('d-none');
  }

  function closeArticle() { document.getElementById('article-modal').classList.add('d-none'); }

  loadResources();
</script>
</body>
</html>
