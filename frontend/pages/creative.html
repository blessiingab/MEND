<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creative Space — MEND</title>
  <link rel="stylesheet" href="../css/mend.css" />
</head>
<body>
<div id="main-navbar"></div>
<div class="app-layout">
  <aside class="mend-sidebar" id="main-sidebar"></aside>
  <main class="main-content">

    <div class="page-header">
      <div class="page-title">Creative Space ✍️</div>
      <div class="page-sub">Express yourself. Your story has power. Your art heals.</div>
    </div>

    <div class="mend-tabs">
      <button class="mend-tab active" onclick="showTab('feed',this)">📖 Community Feed</button>
      <button class="mend-tab" onclick="showTab('write',this)">✍️ Share Story</button>
    </div>

    <!-- Feed -->
    <div id="tab-feed">
      <div class="d-flex gap-2 flex-wrap mb-4" id="tag-filters">
        <button class="btn btn-sm btn-terra" onclick="filterTag('',this)">All</button>
        <button class="btn btn-sm btn-outline-terra" onclick="filterTag('mentalhealth',this)">#mentalhealth</button>
        <button class="btn btn-sm btn-outline-terra" onclick="filterTag('career',this)">#career</button>
        <button class="btn btn-sm btn-outline-terra" onclick="filterTag('healing',this)">#healing</button>
        <button class="btn btn-sm btn-outline-terra" onclick="filterTag('art',this)">#art</button>
        <button class="btn btn-sm btn-outline-terra" onclick="filterTag('family',this)">#family</button>
      </div>
      <div id="stories-feed"><div class="color-muted">Loading stories…</div></div>
    </div>

    <!-- Write -->
    <div id="tab-write" class="d-none">
      <div class="mend-card-flat">
        <h3>Share Your Story</h3>
        <p class="color-muted mb-4 font-14">This is a safe, moderated space. Your words can heal others.</p>

        <div class="form-group mb-3">
          <label class="form-label">Emoji (mood / theme)</label>
          <div class="d-flex gap-2 flex-wrap" id="emoji-picker">
            <button class="btn btn-sm btn-outline-terra emoji-opt" onclick="selectEmoji('✍️',this)">✍️</button>
            <button class="btn btn-sm btn-outline-terra emoji-opt" onclick="selectEmoji('💔',this)">💔</button>
            <button class="btn btn-sm btn-outline-terra emoji-opt" onclick="selectEmoji('🌱',this)">🌱</button>
            <button class="btn btn-sm btn-outline-terra emoji-opt" onclick="selectEmoji('🔥',this)">🔥</button>
            <button class="btn btn-sm btn-outline-terra emoji-opt" onclick="selectEmoji('🌍',this)">🌍</button>
            <button class="btn btn-sm btn-outline-terra emoji-opt" onclick="selectEmoji('🎨',this)">🎨</button>
            <button class="btn btn-sm btn-outline-terra emoji-opt" onclick="selectEmoji('💡',this)">💡</button>
            <button class="btn btn-sm btn-outline-terra emoji-opt" onclick="selectEmoji('🙏',this)">🙏</button>
          </div>
        </div>
        <div class="form-group mb-3">
          <label class="form-label">Title (optional)</label>
          <input id="story-title" class="form-control" placeholder="Give your story a title…" />
        </div>
        <div class="form-group mb-3">
          <label class="form-label">Your Story *</label>
          <textarea id="story-content" class="form-control" rows="7" placeholder="Write your story, poem, reflection, or anything you'd like to share…"></textarea>
          <div class="form-hint" id="char-count">0 / 2000 characters</div>
        </div>
        <div class="form-group mb-3">
          <label class="form-label">Tags (comma-separated)</label>
          <input id="story-tags" class="form-control" placeholder="e.g. healing, mentalhealth, poetry" />
        </div>
        <div class="d-flex align-items-center gap-2 mb-4">
          <input class="form-check-input" type="checkbox" id="story-anon" />
          <label class="form-check-label" for="story-anon">Post anonymously</label>
        </div>
        <div id="story-error" class="auth-message error d-none mb-3"></div>
        <button class="btn btn-terra" id="post-btn" onclick="postStory()">Publish Story →</button>
      </div>
    </div>

  </main>
</div>

<script src="/js/mend.js"></script>
<script>
  if (!Auth.requireAuth()) throw new Error();
  renderNavbar('creative'); renderSidebar('creative');
  let allStories = [], activeTag = '', selectedEmoji = '✍️';

  function showTab(id, btn) {
    document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('d-none'));
    document.querySelectorAll('.mend-tab').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-'+id).classList.remove('d-none');
    btn.classList.add('active');
  }

  function filterTag(tag, btn) {
    activeTag = tag;
    document.querySelectorAll('#tag-filters button').forEach(b => b.className='btn btn-sm btn-outline-terra');
    btn.className = 'btn btn-sm btn-terra';
    renderFeed();
  }

  function renderFeed() {
    const filtered = activeTag ? allStories.filter(s => (s.tags||[]).some(t => t.toLowerCase().includes(activeTag))) : allStories;
    const el = document.getElementById('stories-feed');
    if (!filtered.length) {
      el.innerHTML = `<div class="mend-card-flat text-center py-5">
        <div style="font-size:2.5rem">✍️</div>
        <h4 style="font-family:var(--serif);margin-top:12px">No stories yet</h4>
        <p class="color-muted font-14">Be the first to share your story.</p>
        <button class="btn btn-terra mt-3" onclick="showTab('write',document.querySelectorAll('.mend-tab')[1])">Share a Story →</button>
      </div>`;
      return;
    }
    el.innerHTML = filtered.map(s => `
      <div class="story-card">
        <div class="d-flex align-items-center gap-3 mb-2">
          <span style="font-size:1.5rem">${s.emoji||'✍️'}</span>
          <div>
            <div class="story-author">${s.author}</div>
            <div class="story-time">${fmtDate(s.createdAt)}</div>
          </div>
        </div>
        ${s.title?`<div class="story-title">${s.title}</div>`:''}
        <div class="story-body">${s.content.length>300?s.content.slice(0,300)+'…':s.content}</div>
        <div class="mt-2">${(s.tags||[]).map(t=>`<span class="story-tag">#${t}</span>`).join('')}</div>
        <div class="d-flex gap-2 mt-3">
          <button class="reaction-btn" onclick="react(${s.id},'like',this)">👍 ${s.likes||0}</button>
          <button class="reaction-btn" onclick="react(${s.id},'heart',this)">❤️ ${s.hearts||0}</button>
        </div>
      </div>`).join('');
  }

  async function loadStories() { allStories = await api.get('/stories'); renderFeed(); }

  async function react(id, type, btn) {
    const data = await api.post('/stories/'+id+'/like', { type });
    const btns = btn.closest('.d-flex').querySelectorAll('.reaction-btn');
    btns[0].textContent = '👍 ' + data.likes;
    btns[1].textContent = '❤️ ' + data.hearts;
  }

  function selectEmoji(e, btn) {
    selectedEmoji = e;
    document.querySelectorAll('.emoji-opt').forEach(b => b.className='btn btn-sm btn-outline-terra emoji-opt');
    btn.className = 'btn btn-sm btn-terra emoji-opt';
  }

  document.getElementById('story-content').addEventListener('input', function() {
    document.getElementById('char-count').textContent = this.value.length + ' / 2000 characters';
  });

  async function postStory() {
    const title = document.getElementById('story-title').value.trim();
    const content = document.getElementById('story-content').value.trim();
    const tagsRaw = document.getElementById('story-tags').value;
    const anonymous = document.getElementById('story-anon').checked;
    const errEl = document.getElementById('story-error');
    errEl.classList.add('d-none');
    if (!content) { errEl.textContent='Please write your story before posting.'; errEl.classList.remove('d-none'); return; }
    const tags = tagsRaw.split(',').map(t=>t.trim().replace(/^#/,'')).filter(Boolean);
    const btn = document.getElementById('post-btn');
    btn.disabled=true; btn.textContent='Publishing…';
    try {
      await api.post('/stories', { emoji: selectedEmoji, title, content, tags, anonymous });
      showToast('Story published! 🎉','success');
      document.getElementById('story-title').value='';
      document.getElementById('story-content').value='';
      document.getElementById('story-tags').value='';
      document.getElementById('story-anon').checked=false;
      showTab('feed', document.querySelectorAll('.mend-tab')[0]);
      loadStories();
    } catch(e) { errEl.textContent=e.message; errEl.classList.remove('d-none'); }
    finally { btn.disabled=false; btn.textContent='Publish Story →'; }
  }

  loadStories();
</script>
</body>
</html>
