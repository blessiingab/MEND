<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Therapy Booking — MEND</title>
  <link rel="stylesheet" href="../css/mend.css" />
</head>
<body>
<div id="main-navbar"></div>
<div class="app-layout">
  <aside class="mend-sidebar" id="main-sidebar"></aside>
  <main class="main-content">

    <div class="page-header">
      <div class="page-title">Book a Therapy Session 💬</div>
      <div class="page-sub">All therapists are certified, culturally competent, and confidential</div>
    </div>

    <div class="alert mb-4">
      🔒 <strong>Confidential:</strong> All sessions are 100% private. Video, voice, or text-based sessions available.
    </div>

    <div class="mend-tabs">
      <button class="mend-tab active" onclick="showTab('therapists',this)">👩‍⚕️ Find a Therapist</button>
      <button class="mend-tab" onclick="showTab('my-bookings',this)">📅 My Bookings</button>
    </div>

    <div id="tab-therapists">
      <div class="row g-4" id="therapists-grid">
        <div class="col-12 color-muted">Loading…</div>
      </div>
    </div>

    <div id="tab-my-bookings" class="d-none">
      <div id="my-bookings-list"><div class="color-muted">Loading…</div></div>
    </div>

  </main>
</div>

<!-- Booking Modal -->
<div id="booking-modal" class="mend-modal-overlay d-none">
  <div class="mend-modal-box">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h3 id="modal-therapist-name">Book Session</h3>
      <button onclick="closeModal()" aria-label="Close">×</button>
    </div>
    <div class="form-group mb-3">
      <label class="form-label">Select Date</label>
      <input type="date" id="booking-date" class="form-control" placeholder="Select a date">
    </div>
    <div class="form-group mb-3">
      <label class="form-label">Select Time Slot</label>
      <div class="d-flex gap-2 flex-wrap" id="slot-buttons"></div>
    </div>
    <div class="form-group mb-4">
      <label class="form-label">Note for Therapist (optional)</label>
      <textarea id="booking-note" class="form-control" rows="3" placeholder="What would you like to focus on?"></textarea>
    </div>
    <div id="booking-error" class="auth-message error d-none mb-3"></div>
    <div class="d-flex gap-3">
      <button class="btn btn-terra flex-grow-1" id="confirm-btn" onclick="confirmBooking()">Confirm Booking ✓</button>
      <button class="btn btn-outline-terra" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="../js/mend.js"></script>
<script>
  if (!Auth.requireAuth()) throw new Error();
  renderNavbar('therapy'); renderSidebar('therapy');
  let currentTherapist = null, selectedSlot = null;

  function showTab(id, btn) {
    document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('d-none'));
    document.querySelectorAll('.mend-tab').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-' + id).classList.remove('d-none');
    btn.classList.add('active');
    if (id === 'my-bookings') loadMyBookings();
  }

  async function loadTherapists() {
    const therapists = await api.get('/therapists');
    document.getElementById('therapists-grid').innerHTML = therapists.map(t => `
      <div class="col-md-6 col-lg-4">
        <div class="therapist-card h-100">
          <span class="therapist-emoji">${t.emoji}</span>
          <div class="therapist-name">${t.name}</div>
          <div class="therapist-spec">${t.specialty}</div>
          <div class="therapist-rating">⭐ ${t.rating} &nbsp;·&nbsp; ${t.sessions} sessions</div>
          <div class="d-flex gap-2 mb-3 flex-wrap">${t.slots.map(s=>`<span class="mend-badge badge-terra">${s}</span>`).join('')}</div>
          <button class="btn btn-terra w-100" onclick='openBooking(${JSON.stringify(t)})'>Book Session →</button>
        </div>
      </div>`).join('');
  }

  function openBooking(t) {
    currentTherapist = t; selectedSlot = null;
    document.getElementById('modal-therapist-name').textContent = 'Book with ' + t.name;
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('booking-date').value = today;
    document.getElementById('booking-date').min = today;
    document.getElementById('booking-note').value = '';
    document.getElementById('booking-error').classList.add('d-none');
    document.getElementById('slot-buttons').innerHTML = t.slots.map(s =>
      `<button class="btn btn-sm btn-outline-terra" onclick="selectSlot('${s}',this)">${s}</button>`).join('');
    document.getElementById('booking-modal').classList.remove('d-none');
  }

  function selectSlot(slot, btn) {
    selectedSlot = slot;
    document.querySelectorAll('#slot-buttons button').forEach(b => b.className='btn btn-sm btn-outline-terra');
    btn.className = 'btn btn-sm btn-terra';
  }

  function closeModal() { document.getElementById('booking-modal').classList.add('d-none'); }

  async function confirmBooking() {
    const date = document.getElementById('booking-date').value;
    const note = document.getElementById('booking-note').value;
    const errEl = document.getElementById('booking-error');
    errEl.classList.add('d-none');
    if (!date) { errEl.textContent='Please select a date.'; errEl.classList.remove('d-none'); return; }
    if (!selectedSlot) { errEl.textContent='Please select a time slot.'; errEl.classList.remove('d-none'); return; }
    const btn = document.getElementById('confirm-btn');
    btn.disabled = true; btn.textContent = 'Booking…';
    try {
      await api.post('/bookings', { therapistId: currentTherapist.id, date, slot: selectedSlot, note });
      closeModal(); showToast('Session booked successfully! 🎉','success');
      showTab('my-bookings', document.querySelectorAll('.mend-tab')[1]);
    } catch(e) { errEl.textContent=e.message; errEl.classList.remove('d-none'); }
    finally { btn.disabled=false; btn.textContent='Confirm Booking ✓'; }
  }

  async function loadMyBookings() {
    const el = document.getElementById('my-bookings-list');
    el.innerHTML = '<div class="color-muted">Loading…</div>';
    const bookings = await api.get('/bookings');
    if (!bookings.length) {
      el.innerHTML = `<div class="mend-card-flat text-center py-5">
        <div style="font-size:2.5rem">📅</div>
        <h4 style="font-family:var(--serif);margin-top:12px">No bookings yet</h4>
        <p class="color-muted font-14">Find a therapist and book your first session.</p>
        <button class="btn btn-terra mt-3" onclick="showTab('therapists',document.querySelectorAll('.mend-tab')[0])">Find a Therapist →</button>
      </div>`;
      return;
    }
    el.innerHTML = bookings.map(b => `
      <div class="mend-card-flat mb-3">
        <div class="d-flex align-items-center gap-3 flex-wrap">
          <div style="font-size:2rem">${b.therapist?.emoji||'💬'}</div>
          <div class="flex-grow-1">
            <div class="font-weight-700">${b.therapist?.name||'Therapist'}</div>
            <div class="font-13 color-terra">${b.therapist?.specialty||''}</div>
            <div class="d-flex gap-2 flex-wrap mt-2">
              <span class="mend-badge badge-terra">📅 ${b.date}</span>
              <span class="mend-badge badge-terra">⏰ ${b.slot}</span>
              <span class="mend-badge ${b.status==='confirmed'?'badge-green':'badge-muted'}">${b.status}</span>
            </div>
            ${b.note?`<div class="font-13 color-muted mt-1">📝 ${b.note}</div>`:''}
          </div>
          ${b.status==='confirmed'?`<button class="btn btn-sm btn-outline-terra" onclick="cancelBooking(${b.id})">Cancel</button>`:''}
        </div>
      </div>`).join('');
  }

  async function cancelBooking(id) {
    if (!confirm('Cancel this session?')) return;
    await api.delete('/bookings/'+id);
    showToast('Booking cancelled.','');
    loadMyBookings();
  }

  loadTherapists();
</script>
</body>
</html>
